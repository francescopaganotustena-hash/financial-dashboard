services:
  - type: web
    name: financial-dashboard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEFAULT_BENCHMARK
        value: SPY
      - key: CACHE_TTL_WEEKLY
        value: "3600"
      - key: CACHE_TTL_DAILY
        value: "300"
      - key: YFINANCE_TIMEOUT_SEC
        value: "6"
      - key: REDIS_URL
        value: ""
      - key: CORS_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
      - key: CORS_ORIGIN_REGEX
        value: '^https://.*\\.vercel\\.app$'
      - key: NEWSAPI_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
