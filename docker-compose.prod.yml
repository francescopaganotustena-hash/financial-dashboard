version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: rrg-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rrg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: rrg-backend
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    networks:
      - rrg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: rrg-frontend
    # Static files are served by nginx
    # This container is kept for potential future use
    networks:
      - rrg-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rrg-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - rrg-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rrg-network:
    driver: bridge

volumes:
  redis_data:
